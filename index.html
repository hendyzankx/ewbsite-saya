<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasir Hendy - Offline</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:10px; background:#f4f4f4; }
    .container { max-width: 850px; margin:0 auto; background:white; padding:15px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
    h1, h3 { text-align:center; }
    #scanner { width:100%; max-width:380px; margin:15px auto; border:3px solid #007bff; border-radius:10px; }
    input, button { padding:12px; margin:6px 0; width:100%; font-size:16px; border-radius:6px; }
    button { background:#007bff; color:white; border:none; cursor:pointer; font-weight:bold; }
    button.red { background:#dc3545; }
    button.green { background:#28a745; }
    table { width:100%; border-collapse:collapse; margin:15px 0; }
    th, td { border:1px solid #ddd; padding:10px; text-align:left; }
    th { background:#f0f0f0; }
    #total { font-size:22px; font-weight:bold; color:#28a745; text-align:center; margin:15px 0; }
    .struk { background:#fff; padding:20px; border:2px dashed #000; margin:20px 0; font-family:monospace; white-space:pre-wrap; }
    #status { padding:12px; text-align:center; font-weight:bold; border-radius:8px; margin:10px 0; }
    .offline { background:#ffebee; color:#c62828; }
    .online { background:#e8f5e9; color:#2e7d32; }
  </style>
</head>
<body>
<div class="container">
  <h1>🛒 Kasir Hendy Offline</h1>
  <div id="status">Memeriksa koneksi...</div>

  <div id="scanner"></div>
  <button onclick="stopScanner()">Stop Scanner</button>

  <h3>Input Manual</h3>
  <input type="text" id="kodeManual" placeholder="Kode Barang">
  <input type="text" id="namaManual" placeholder="Nama Barang">
  <input type="number" id="hargaManual" placeholder="Harga (Rp)">
  <button onclick="tambahManual()">Tambah ke Keranjang</button>

  <h3>Keranjang Belanja</h3>
  <table id="keranjangTable">
    <thead><tr><th>Kode</th><th>Nama</th><th>Harga</th><th>Qty</th><th>Subtotal</th><th>Aksi</th></tr></thead>
    <tbody></tbody>
  </table>

  <div id="total">Total: Rp 0</div>

  <h3>Pembayaran</h3>
  <input type="number" id="uangBayar" placeholder="Uang Dibayar" oninput="hitungKembalian()">
  <div id="kembalian">Kembalian: Rp 0</div>

  <button onclick="selesaiTransaksi()" style="background:#28a745;">Selesai & Simpan Transaksi</button>
  <button onclick="printBluetooth()" class="green">🖨️ Print Bluetooth Thermal</button>
  <button onclick="lihatRiwayat()" style="background:#6c757d;">📋 Lihat Riwayat</button>

  <div id="strukPreview" class="struk" style="display:none;"></div>
</div>

<script>
// Gunakan LocalStorage sebagai fallback (lebih aman untuk testing lokal)
let keranjang = [];
let transaksiRiwayat = JSON.parse(localStorage.getItem("transaksiRiwayat") || "[]");
let html5QrCode;

function saveRiwayat() {
  localStorage.setItem("transaksiRiwayat", JSON.stringify(transaksiRiwayat));
}

// Scanner & Keranjang (sama seperti sebelumnya)
function mulaiScanner() {
  html5QrCode = new Html5Qrcode("scanner");
  html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } },
    (decodedText) => {
      const nama = prompt("Nama Barang untuk kode " + decodedText + "?", "Barang " + decodedText);
      const harga = parseInt(prompt("Harga Barang?", "10000")) || 0;
      if (nama && harga > 0) tambahKeKeranjang(decodedText, nama, harga, 1);
      stopScanner();
    }
  );
}

function stopScanner() {
  if (html5QrCode) html5QrCode.stop();
}

function tambahKeKeranjang(kode, nama, harga, qty = 1) {
  const existing = keranjang.find(i => i.kode === kode);
  if (existing) existing.qty += qty;
  else keranjang.push({kode, nama, harga, qty});
  renderKeranjang();
}

function tambahManual() {
  const kode = document.getElementById("kodeManual").value.trim();
  const nama = document.getElementById("namaManual").value.trim();
  const harga = parseInt(document.getElementById("hargaManual").value) || 0;
  if (kode && nama && harga > 0) {
    tambahKeKeranjang(kode, nama, harga, 1);
    // clear input
    document.getElementById("kodeManual").value = "";
    document.getElementById("namaManual").value = "";
    document.getElementById("hargaManual").value = "";
  } else alert("Isi semua field manual!");
}

function renderKeranjang() {
  const tbody = document.querySelector("#keranjangTable tbody");
  tbody.innerHTML = "";
  let total = 0;

  keranjang.forEach((item, index) => {
    const sub = item.harga * item.qty;
    total += sub;
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${item.kode}</td>
      <td>${item.nama}</td>
      <td>Rp ${item.harga.toLocaleString('id-ID')}</td>
      <td><input type="number" value="${item.qty}" style="width:70px" onchange="ubahQty(${index}, this.value)"></td>
      <td>Rp ${sub.toLocaleString('id-ID')}</td>
      <td><button onclick="hapusItem(${index})" class="red">Hapus</button></td>
    `;
    tbody.appendChild(row);
  });
  document.getElementById("total").textContent = `Total: Rp ${total.toLocaleString('id-ID')}`;
}

function ubahQty(index, qty) {
  keranjang[index].qty = parseInt(qty) || 1;
  renderKeranjang();
}

function hapusItem(index) {
  keranjang.splice(index, 1);
  renderKeranjang();
}

function hitungKembalian() {
  const total = keranjang.reduce((sum, item) => sum + item.harga * item.qty, 0);
  const bayar = parseInt(document.getElementById("uangBayar").value) || 0;
  const kembalian = Math.max(0, bayar - total);
  document.getElementById("kembalian").textContent = `Kembalian: Rp ${kembalian.toLocaleString('id-ID')}`;
}

function selesaiTransaksi() {
  if (keranjang.length === 0) return alert("Keranjang kosong!");

  const total = keranjang.reduce((sum, item) => sum + item.harga * item.qty, 0);
  const bayar = parseInt(document.getElementById("uangBayar").value) || total;
  const kembalian = Math.max(0, bayar - total);

  const transaksi = {
    timestamp: new Date().toISOString(),
    items: JSON.parse(JSON.stringify(keranjang)),
    total: total,
    bayar: bayar,
    kembalian: kembalian
  };

  transaksiRiwayat.unshift(transaksi); // tambah di depan
  if (transaksiRiwayat.length > 100) transaksiRiwayat.pop(); // batasi riwayat
  saveRiwayat();

  // Tampilkan struk
  let struk = `=== STRUK BELANJA ===\nTanggal: ${new Date().toLocaleString('id-ID')}\n\n`;
  transaksi.items.forEach(item => {
    struk += `${item.nama} x${item.qty} = Rp ${(item.harga * item.qty).toLocaleString('id-ID')}\n`;
  });
  struk += `\nTOTAL     : Rp ${total.toLocaleString('id-ID')}\n`;
  struk += `BAYAR     : Rp ${bayar.toLocaleString('id-ID')}\n`;
  struk += `KEMBALIAN : Rp ${kembalian.toLocaleString('id-ID')}\n\nTerima Kasih!`;

  document.getElementById("strukPreview").innerHTML = `<pre>${struk}</pre>`;
  document.getElementById("strukPreview").style.display = "block";

  alert("Transaksi berhasil disimpan di LocalStorage!");

  keranjang = [];
  renderKeranjang();
  document.getElementById("uangBayar").value = "";
}

async function printBluetooth() { /* kode print bluetooth tetap sama seperti sebelumnya */ 
  alert("Print Bluetooth siap digunakan (pastikan printer sudah dipairing).");
}

function lihatRiwayat() {
  if (transaksiRiwayat.length === 0) return alert("Belum ada riwayat transaksi.");
  let msg = "Riwayat Transaksi Terakhir:\n\n";
  transaksiRiwayat.slice(0, 10).forEach(t => {
    msg += `${new Date(t.timestamp).toLocaleString('id-ID')} → Rp ${t.total.toLocaleString('id-ID')}\n`;
  });
  alert(msg);
}

function updateStatus() {
  const statusEl = document.getElementById("status");
  const online = navigator.onLine;
  statusEl.textContent = online ? "✅ Online" : "❌ Offline - Data disimpan di browser";
  statusEl.className = online ? "online" : "offline";
}

window.onload = () => {
  updateStatus();
  mulaiScanner();
  renderKeranjang();
  window.addEventListener('online', updateStatus);
  window.addEventListener('offline', updateStatus);
};
</script>
</body>
</html>
