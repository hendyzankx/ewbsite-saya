<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kasir Hendy</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4; }
    .container { max-width:100%; margin:0 auto; background:white; min-height:100vh; }
    .header { background:#007bff; color:white; padding:15px; text-align:center; font-size:20px; font-weight:bold; }
    .nav { display:flex; background:#f8f9fa; padding:10px; gap:10px; border-bottom:1px solid #ddd; }
    .nav button { flex:1; padding:12px; font-size:16px; border:none; border-radius:8px; }
    .nav button.active { background:#007bff; color:white; }

    .page { display:none; padding:15px; }
    .page.active { display:block; }

    #scanner { width:100%; max-width:400px; margin:15px auto; border:5px solid #007bff; border-radius:15px; overflow:hidden; }

    input, select, button { 
      padding:14px; margin:8px 0; width:100%; font-size:17px; 
      border-radius:8px; box-sizing:border-box; 
    }
    input, select { border:1px solid #ccc; }
    button { background:#007bff; color:white; border:none; font-weight:bold; }
    button.red { background:#dc3545; }
    button.green { background:#28a745; }
    button.small { padding:10px; font-size:15px; }

    table { width:100%; border-collapse:collapse; margin:15px 0; font-size:15px; }
    th, td { border:1px solid #ddd; padding:10px; text-align:left; }
    th { background:#f0f0f0; }
    .low-stock { color: #d32f2f; font-weight: bold; }

    #total { font-size:24px; font-weight:bold; color:#28a745; text-align:center; margin:20px 0; padding:12px; background:#f8fff8; border-radius:8px; }

    .modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; }
    .modal-content { background:white; width:95%; max-width:520px; max-height:90vh; border-radius:12px; overflow:hidden; }
    .modal-header { background:#007bff; color:white; padding:15px; font-weight:bold; display:flex; justify-content:space-between; }
    .search-box { width:100%; padding:12px; margin-bottom:15px; border:1px solid #ccc; border-radius:8px; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">🛒 Kasir Hendy</div>

  <div class="nav">
    <button id="btnKasir" class="active" onclick="showPage('kasir')">💰 Kasir</button>
    <button id="btnStok" onclick="showPage('stok')">📦 Stok Barang</button>
  </div>

  <!-- ================== HALAMAN KASIR ================== -->
  <div id="pageKasir" class="page active">
    <div id="scanner"></div>
    <div style="text-align:center; margin:10px 0;">
      <button onclick="toggleTorch()" id="torchBtn" class="small" style="background:#17a2b8;">🔦 Flashlight: OFF</button>
    </div>

    <button onclick="stopScanner()" class="small">⏹️ Stop Scanner</button>

    <h3>Input Manual</h3>
    <input type="text" id="kodeManual" placeholder="Kode Barang">
    <input type="text" id="namaManual" placeholder="Nama Barang">
    <input type="number" id="hargaManual" placeholder="Harga (Rp)">
    <select id="kategoriManual"></select>
    <button onclick="tambahManual()">+ Tambah ke Keranjang</button>

    <h3>Keranjang Belanja</h3>
    <table id="keranjangTable">
      <thead><tr><th>Kode</th><th>Nama</th><th>Kategori</th><th>Harga</th><th>Qty</th><th>Sub</th><th>Aksi</th></tr></thead>
      <tbody></tbody>
    </table>

    <div id="total">Total: Rp 0</div>

    <h3>Pembayaran</h3>
    <input type="number" id="uangBayar" placeholder="Uang Dibayar" oninput="hitungKembalian()">
    <div id="kembalian">Kembalian: Rp 0</div>

    <button onclick="selesaiTransaksi()" class="green">✅ Selesai & Simpan Struk</button>
    <button onclick="printBluetooth()" class="green">🖨️ Print Bluetooth</button>
  </div>

  <!-- ================== HALAMAN STOK BARANG ================== -->
  <div id="pageStok" class="page">
    <h3>📦 Manajemen Stok Barang</h3>
    <input type="text" id="searchStok" class="search-box" placeholder="Cari kode, nama, atau kategori..." onkeyup="filterStok()">
    
    <button onclick="tambahBarangStok()" class="green">+ Tambah Barang Baru</button>

    <table id="tabelStok">
      <thead>
        <tr>
          <th>Kode</th>
          <th>Nama</th>
          <th>Kategori</th>
          <th>Harga</th>
          <th>Stok</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
// ================== DATA ==================
let masterBarang = [];   // {kode, nama, harga, kategori, stok}
let keranjang = [];
let transaksiRiwayat = [];
let html5QrCode = null;
let isTorchOn = false;
let audioContext = null;

// Load data
function loadData() {
  try {
    masterBarang = JSON.parse(localStorage.getItem("masterBarang") || "[]");
    keranjang = JSON.parse(localStorage.getItem("keranjang") || "[]");
    transaksiRiwayat = JSON.parse(localStorage.getItem("kasirRiwayat") || "[]");
  } catch(e) {}
}

function saveData() {
  try {
    localStorage.setItem("masterBarang", JSON.stringify(masterBarang));
    localStorage.setItem("keranjang", JSON.stringify(keranjang));
    localStorage.setItem("kasirRiwayat", JSON.stringify(transaksiRiwayat));
  } catch(e) {}
}

// Beep
function initAudio() {
  if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
}
function playBeep() {
  initAudio();
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(1350, audioContext.currentTime);
  gain.gain.value = 0.35;
  osc.connect(gain);
  gain.connect(audioContext.destination);
  osc.start();
  setTimeout(() => osc.stop(), 70);
}

// ================== NAVIGASI ==================
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1)).classList.add('active');
  
  document.getElementById('btnKasir').classList.toggle('active', page === 'kasir');
  document.getElementById('btnStok').classList.toggle('active', page === 'stok');

  if (page === 'kasir') mulaiScanner();
  else stopScanner();
}

// ================== SCANNER ==================
function mulaiScanner() {
  if (html5QrCode) return;
  html5QrCode = new Html5Qrcode("scanner");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 15, qrbox: { width: 300, height: 180 } },
    (decodedText) => {
      playBeep();
      if (navigator.vibrate) navigator.vibrate(120);

      const barang = masterBarang.find(b => b.kode === decodedText);
      if (barang) {
        if (barang.stok > 0) {
          tambahKeKeranjang(barang.kode, barang.nama, barang.harga, barang.kategori || "Lainnya", 1);
          barang.stok -= 1;   // Kurangi stok
          saveData();
        } else {
          alert(`⚠️ Stok ${barang.nama} HABIS!`);
        }
      } else {
        const nama = prompt("Kode baru: " + decodedText + "\nNama Barang:", "");
        const harga = parseInt(prompt("Harga:", "15000")) || 0;
        const kategori = prompt("Kategori:", "Lainnya");
        const stokAwal = parseInt(prompt("Stok awal:", "100")) || 0;
        if (nama && harga > 0 && kategori) {
          masterBarang.push({kode: decodedText, nama, harga, kategori, stok: stokAwal});
          saveData();
          tambahKeKeranjang(decodedText, nama, harga, kategori, 1);
        }
      }
      if (document.getElementById('pageStok').classList.contains('active')) renderTabelStok();
    }
  );
}

function stopScanner() {
  if (html5QrCode) html5QrCode.stop().then(() => html5QrCode = null);
}

function toggleTorch() {
  if (!html5QrCode) return;
  isTorchOn = !isTorchOn;
  html5QrCode.applyTorch(isTorchOn).then(() => {
    document.getElementById("torchBtn").textContent = isTorchOn ? "🔦 Flashlight: ON" : "🔦 Flashlight: OFF";
  });
}

// ================== KASIR & KERANJANG ==================
function tambahKeKeranjang(kode, nama, harga, kategori, qty=1) {
  const existing = keranjang.find(i => i.kode === kode);
  if (existing) existing.qty += qty;
  else keranjang.push({kode, nama, harga, kategori, qty});
  renderKeranjang();
  saveData();
}

function tambahManual() {
  const kode = document.getElementById("kodeManual").value.trim();
  const nama = document.getElementById("namaManual").value.trim();
  const harga = parseInt(document.getElementById("hargaManual").value) || 0;
  const kategori = document.getElementById("kategoriManual").value || "Lainnya";

  if (!kode || !nama || harga <= 0) return alert("Mohon isi semua field!");

  const barang = masterBarang.find(b => b.kode === kode);
  if (barang) {
    if (barang.stok > 0) {
      tambahKeKeranjang(kode, nama, harga, kategori, 1);
      barang.stok -= 1;
      saveData();
    } else alert("Stok tidak cukup!");
  } else {
    const stokAwal = parseInt(prompt("Stok awal:", "100")) || 0;
    masterBarang.push({kode, nama, harga, kategori, stok: stokAwal});
    saveData();
    tambahKeKeranjang(kode, nama, harga, kategori, 1);
  }
  renderKeranjang();
}

function renderKeranjang() { /* kode sama seperti sebelumnya */ 
  // ... (saya ringkas, copy dari kode lama jika perlu)
  const tbody = document.querySelector("#keranjangTable tbody");
  tbody.innerHTML = "";
  let total = 0;
  keranjang.forEach((item, index) => {
    const sub = item.harga * item.qty;
    total += sub;
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.kode}</td>
      <td>${item.nama}</td>
      <td>${item.kategori}</td>
      <td>${item.harga.toLocaleString('id-ID')}</td>
      <td><input type="number" value="${item.qty}" min="1" onchange="ubahQty(${index}, this.value)"></td>
      <td>${sub.toLocaleString('id-ID')}</td>
      <td><button onclick="hapusItem(${index})" class="red small">Hapus</button></td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById("total").textContent = `Total: Rp ${total.toLocaleString('id-ID')}`;
}

// ================== HALAMAN STOK ==================
function renderTabelStok(keyword = "") {
  const tbody = document.querySelector("#tabelStok tbody");
  tbody.innerHTML = "";

  const filtered = masterBarang.filter(b => 
    !keyword || 
    b.kode.toLowerCase().includes(keyword) ||
    b.nama.toLowerCase().includes(keyword) ||
    (b.kategori && b.kategori.toLowerCase().includes(keyword))
  );

  filtered.forEach((b, i) => {
    const idx = masterBarang.findIndex(item => item.kode === b.kode);
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${b.kode}</td>
      <td>${b.nama}</td>
      <td>${b.kategori || '-'}</td>
      <td>Rp ${b.harga.toLocaleString('id-ID')}</td>
      <td class="${b.stok < 10 ? 'low-stock' : ''}">${b.stok || 0}</td>
      <td>
        <button onclick="ubahStok(${idx}, 1)" class="small">+</button>
        <button onclick="ubahStok(${idx}, -1)" class="small red">-</button>
        <button onclick="editBarangStok(${idx})" style="background:#ffc107;padding:6px 10px;">Edit</button>
        <button onclick="hapusBarangStok(${idx})" class="red" style="padding:6px 10px;">Hapus</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function filterStok() {
  const keyword = document.getElementById("searchStok").value.toLowerCase().trim();
  renderTabelStok(keyword);
}

function ubahStok(index, jumlah) {
  masterBarang[index].stok = (masterBarang[index].stok || 0) + jumlah;
  if (masterBarang[index].stok < 0) masterBarang[index].stok = 0;
  saveData();
  renderTabelStok(document.getElementById("searchStok").value.toLowerCase().trim());
}

function tambahBarangStok() {
  const kode = prompt("Kode Barang:");
  if (!kode) return;
  const nama = prompt("Nama Barang:");
  const harga = parseInt(prompt("Harga (Rp):")) || 0;
  const kategori = prompt("Kategori:", "Lainnya");
  const stok = parseInt(prompt("Stok awal:", "100")) || 0;

  if (nama && harga > 0 && kategori) {
    masterBarang.push({kode, nama, harga, kategori, stok});
    saveData();
    renderTabelStok(document.getElementById("searchStok").value.toLowerCase().trim());
    alert("Barang baru berhasil ditambahkan!");
  }
}

function editBarangStok(index) {
  const b = masterBarang[index];
  const kodeBaru = prompt("Kode:", b.kode);
  const namaBaru = prompt("Nama:", b.nama);
  const hargaBaru = parseInt(prompt("Harga:", b.harga)) || b.harga;
  const kategoriBaru = prompt("Kategori:", b.kategori);
  const stokBaru = parseInt(prompt("Stok:", b.stok)) || b.stok;

  if (kodeBaru && namaBaru && hargaBaru > 0) {
    masterBarang[index] = {kode: kodeBaru, nama: namaBaru, harga: hargaBaru, kategori: kategoriBaru, stok: stokBaru};
    saveData();
    renderTabelStok(document.getElementById("searchStok").value.toLowerCase().trim());
  }
}

function hapusBarangStok(index) {
  if (confirm(`Hapus ${masterBarang[index].nama}?`)) {
    masterBarang.splice(index, 1);
    saveData();
    renderTabelStok(document.getElementById("searchStok").value.toLowerCase().trim());
  }
}

// ================== INIT ==================
window.onload = () => {
  loadData();
  showPage('kasir');
  initAudio();
};
</script>
</body>
</html>
