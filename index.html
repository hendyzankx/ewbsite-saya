<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasir Scanner - Hendy</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background: #f4f4f4; }
    h1 { text-align: center; }
    #scanner { width: 100%; max-width: 400px; margin: 10px auto; border: 2px solid #333; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    input, button { padding: 10px; margin: 5px 0; width: 100%; font-size: 16px; }
    button { background: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
    table { width: 100%; border-collapse: collapse; margin: 15px 0; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f0f0f0; }
    #total { font-size: 20px; font-weight: bold; color: green; }
    .struk { background: white; padding: 15px; border: 1px dashed #000; margin: 15px 0; font-family: monospace; }
  </style>
</head>
<body>
<div class="container">
  <h1>🛒 Kasir Scanner</h1>

  <!-- Scanner -->
  <div id="scanner"></div>
  <button onclick="stopScanner()">Stop Scanner</button>

  <!-- Input Manual -->
  <h3>Input Manual</h3>
  <input type="text" id="kodeManual" placeholder="Kode Barang" onkeypress="if(event.key==='Enter') tambahManual()">
  <input type="text" id="namaManual" placeholder="Nama Barang">
  <input type="number" id="hargaManual" placeholder="Harga">
  <button onclick="tambahManual()">Tambah ke Keranjang</button>

  <!-- Keranjang -->
  <h3>Keranjang Belanja</h3>
  <table id="keranjang">
    <thead><tr><th>Kode</th><th>Nama</th><th>Harga</th><th>Qty</th><th>Subtotal</th><th>Aksi</th></tr></thead>
    <tbody></tbody>
  </table>

  <div id="total">Total: Rp 0</div>

  <!-- Pembayaran -->
  <h3>Pembayaran</h3>
  <input type="number" id="uangBayar" placeholder="Uang Dibayar" oninput="hitungKembalian()">
  <div id="kembalian">Kembalian: Rp 0</div>
  <button onclick="selesaiTransaksi()">Selesai & Cetak Struk</button>
  <button onclick="printBluetooth()">Print via Bluetooth Thermal</button>

  <!-- Struk Preview -->
  <div id="strukPreview" class="struk" style="display:none;"></div>
</div>

<script>
// ================== KONFIGURASI ==================
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvOaxIJerNRO-wTtXkAkeBb-5oX5rhYy8NzTdXh-tPGe-Cb3kFq4m6HGMZ256gbt0z2Q/exec"; // Ganti dengan URL Web App Google Script kamu

let keranjang = [];
let html5QrCode;

// ================== SCANNER ==================
function mulaiScanner() {
  html5QrCode = new Html5Qrcode("scanner");
  const config = { fps: 10, qrbox: { width: 250, height: 250 } };

  html5QrCode.start(
    { facingMode: "environment" }, // kamera belakang
    config,
    (decodedText) => {
      // decodedText = kode barcode
      alert("Barcode terdeteksi: " + decodedText);
      // Di sini kamu bisa query nama & harga dari database (Google Sheet lain) atau input manual
      // Untuk contoh sederhana, kita minta nama & harga manual dulu
      const nama = prompt("Nama Barang untuk kode " + decodedText + "?", "Barang " + decodedText);
      const harga = parseInt(prompt("Harga Barang?", "10000")) || 0;
      if (nama && harga > 0) tambahKeKeranjang(decodedText, nama, harga, 1);
      stopScanner();
    },
    (error) => { console.log(error); }
  ).catch(err => console.error(err));
}

function stopScanner() {
  if (html5QrCode) html5QrCode.stop().then(() => console.log("Scanner stopped"));
}

// ================== KERANJANG ==================
function tambahKeKeranjang(kode, nama, harga, qty = 1) {
  const existing = keranjang.find(item => item.kode === kode);
  if (existing) {
    existing.qty += qty;
  } else {
    keranjang.push({kode, nama, harga, qty});
  }
  renderKeranjang();
}

function tambahManual() {
  const kode = document.getElementById("kodeManual").value.trim();
  const nama = document.getElementById("namaManual").value.trim();
  const harga = parseInt(document.getElementById("hargaManual").value) || 0;
  if (kode && nama && harga > 0) {
    tambahKeKeranjang(kode, nama, harga, 1);
    // clear input
    document.getElementById("kodeManual").value = "";
    document.getElementById("namaManual").value = "";
    document.getElementById("hargaManual").value = "";
  } else {
    alert("Isi semua field manual!");
  }
}

function renderKeranjang() {
  const tbody = document.querySelector("#keranjang tbody");
  tbody.innerHTML = "";
  let total = 0;

  keranjang.forEach((item, index) => {
    const subtotal = item.harga * item.qty;
    total += subtotal;
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${item.kode}</td>
      <td>${item.nama}</td>
      <td>Rp ${item.harga.toLocaleString('id-ID')}</td>
      <td><input type="number" value="${item.qty}" style="width:60px" onchange="ubahQty(${index}, this.value)"></td>
      <td>Rp ${subtotal.toLocaleString('id-ID')}</td>
      <td><button onclick="hapusItem(${index})">Hapus</button></td>
    `;
    tbody.appendChild(row);
  });

  document.getElementById("total").innerHTML = `Total: Rp ${total.toLocaleString('id-ID')}`;
}

function ubahQty(index, qtyBaru) {
  keranjang[index].qty = parseInt(qtyBaru) || 1;
  renderKeranjang();
}

function hapusItem(index) {
  keranjang.splice(index, 1);
  renderKeranjang();
}

// ================== PEMBAYARAN ==================
function hitungKembalian() {
  const total = keranjang.reduce((sum, item) => sum + (item.harga * item.qty), 0);
  const bayar = parseInt(document.getElementById("uangBayar").value) || 0;
  const kembalian = bayar - total;
  document.getElementById("kembalian").innerHTML = `Kembalian: Rp ${(kembalian < 0 ? 0 : kembalian).toLocaleString('id-ID')}`;
}

// ================== SELESAI TRANSAKSI ==================
async function selesaiTransaksi() {
  if (keranjang.length === 0) return alert("Keranjang kosong!");

  const total = keranjang.reduce((sum, item) => sum + (item.harga * item.qty), 0);
  const bayar = parseInt(document.getElementById("uangBayar").value) || total;
  const kembalian = Math.max(0, bayar - total);

  // Buat struk
  let strukHTML = `<h3>Struk Belanja</h3><p>Tanggal: ${new Date().toLocaleString('id-ID')}</p><table><tr><th>Kode</th><th>Nama</th><th>Harga</th><th>Qty</th><th>Sub</th></tr>`;
  
  keranjang.forEach(item => {
    const sub = item.harga * item.qty;
    strukHTML += `<tr><td>${item.kode}</td><td>${item.nama}</td><td>${item.harga}</td><td>${item.qty}</td><td>${sub}</td></tr>`;
    
    // Kirim tiap item ke Google Sheets
    fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        kode: item.kode,
        nama: item.nama,
        harga: item.harga,
        qty: item.qty,
        subtotal: sub,
        total: total,
        pembayaran: bayar,
        kembalian: kembalian
      })
    });
  });

  strukHTML += `</table><p><strong>Total: Rp ${total.toLocaleString('id-ID')}</strong></p>`;
  strukHTML += `<p>Uang Bayar: Rp ${bayar.toLocaleString('id-ID')}</p>`;
  strukHTML += `<p>Kembalian: Rp ${kembalian.toLocaleString('id-ID')}</p>`;
  strukHTML += `<p>Terima Kasih!</p>`;

  document.getElementById("strukPreview").innerHTML = strukHTML;
  document.getElementById("strukPreview").style.display = "block";

  alert("Transaksi selesai! Data terkirim ke Google Sheets.");
  // Reset keranjang
  keranjang = [];
  renderKeranjang();
  document.getElementById("uangBayar").value = "";
  document.getElementById("kembalian").innerHTML = "Kembalian: Rp 0";
}

// ================== PRINT BLUETOOTH (Thermal Printer) ==================
// Catatan: Hanya work di Chrome/Android, printer harus support ESC/POS via Bluetooth
async function printBluetooth() {
  if (keranjang.length === 0) return alert("Tidak ada transaksi!");

  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }], // UUID umum untuk printer thermal
      optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
    const characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb'); // write characteristic

    // Buat ESC/POS command sederhana
    let commands = new Uint8Array([
      0x1B, 0x40,                    // Initialize
      0x1B, 0x61, 0x01,              // Center align
      0x1B, 0x21, 0x10,              // Double height
    ]);

    let text = "STRUK BELANJA\n";
    text += "===============\n\n";
    keranjang.forEach(item => {
      text += `${item.nama} x${item.qty} @${item.harga}\n`;
      text += `  Rp ${(item.harga*item.qty).toLocaleString('id-ID')}\n`;
    });

    const total = keranjang.reduce((a, b) => a + b.harga * b.qty, 0);
    text += `\nTOTAL: Rp ${total.toLocaleString('id-ID')}\n`;
    text += "Terima Kasih!\n\n";

    // Convert text ke bytes + ESC/POS commands
    const encoder = new TextEncoder();
    const textBytes = encoder.encode(text);
    
    await characteristic.writeValue(commands);
    await characteristic.writeValue(textBytes);
    await characteristic.writeValue(new Uint8Array([0x0A, 0x0A, 0x1D, 0x56, 0x00])); // Feed + cut (jika support)

    alert("Perintah print dikirim ke printer Bluetooth!");
  } catch (err) {
    console.error(err);
    alert("Gagal connect ke printer Bluetooth.\nPastikan printer ON dan pairing sudah dilakukan.\nError: " + err.message);
  }
}

// Mulai otomatis
window.onload = () => {
  mulaiScanner();
};
</script>
</body>
</html>
