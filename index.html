<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kasir Pro Hybrid (Offline Safe)</title>
    
    <!-- Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --biru: #2563eb; --hijau: #16a34a; --merah: #dc2626; --oren: #ea580c;
        --abu: #f1f5f9; --emas: #d97706;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Inter", sans-serif; }
      body { background: #e2e8f0; font-size: 14px; }
      
      .app-container { background: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
      .header { background: linear-gradient(135deg, var(--biru), #1e40af); color: white; padding: 15px; flex-shrink: 0; }
      .header h1 { font-size: 18px; font-weight: 800; margin-bottom: 2px; text-transform: uppercase; }
      .header small { font-size: 11px; opacity: 0.9; display: block; }
      
      /* Tabs */
      .tabs { display: flex; background: #e2e8f0; flex-shrink: 0; }
      .tabs button { flex: 1; padding: 10px 5px; border: none; background: none; font-weight: 600; cursor: pointer; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .tabs button.aktif { background: white; color: var(--biru); border-top: 3px solid var(--biru); }
      
      .content-area { flex: 1; overflow-y: auto; padding: 10px; }
      
      /* Notification Badge for Offline Status */
      .status-badge {
        padding: 5px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; text-align: center;
        margin-bottom: 10px; display: none;
      }
      .status-offline { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; display: block; }
      .status-synced { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; display: block; }

      /* Inputs & Buttons */
      input, select, textarea { width: 100%; padding: 8px; margin: 4px 0; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; background: white; }
      button { width: 100%; padding: 10px; margin: 4px 0; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; color: white; background: var(--biru); }
      button:hover { opacity: 0.9; }
      .btn-kamera { background: var(--oren) !important; font-size: 11px; padding: 6px; }
      .btn-hapus { background: var(--merah) !important; width: auto !important; padding: 2px 6px !important; font-size: 10px !important; display: inline-block; }
      .btn-small { background: var(--biru) !important; width: auto !important; padding: 4px 8px; font-size: 11px; }
      
      /* Tables */
      .table-responsive-wrapper { max-height: 250px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 6px; margin-top: 5px; }
      table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; }
      th { background: #f1f5f9; position: sticky; top: 0; z-index: 10; text-align: left; font-size: 11px; padding: 6px; }
      td { padding: 6px; border-bottom: 1px solid #e2e8f0; }
      
      .hide { display: none !important; }
      .card { background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 10px; }
      .card h3 { font-size: 14px; margin-bottom: 8px; color: #334155; }
      
      .total-box { background: var(--biru); color: white; padding: 10px; border-radius: 8px; margin: 10px 0; text-align: center; }
      .total-box .angka { font-size: 18px; font-weight: 700; }
      .total-box.hijau { background: var(--hijau); }
      .total-box.emas { background: var(--emas); }
      
      /* Badge */
      .badge { padding: 2px 5px; border-radius: 4px; font-size: 10px; font-weight: 700; display: inline-block; }
      
      /* Modal */
      .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 999; }
      .modal-content { background: white; padding: 15px; border-radius: 8px; width: 90%; max-width: 350px; }
      
      @media print {
        body * { visibility: hidden; }
        #printArea, #printArea * { visibility: visible; }
        #printArea { position: absolute; left: 0; top: 0; width: 100%; }
      }
      #printArea { display: none; }
    </style>
  </head>
  <body>

    <div class="app-container">
      <div class="header">
        <h1 id="headerNamaToko">KASIR PRO HYBRID</h1>
        <small id="headerInfoToko">Memuat data...</small>
      </div>

      <!-- Status Indicator -->
      <div id="connectionStatus" class="status-badge status-synced">Online: Sinkronisasi Aktif</div>

      <div class="tabs">
        <button onclick="gantiTab('kasir')" id="tabKasir" class="aktif">Kasir</button>
        <button onclick="gantiTab('barang')" id="tabBarang">Barang</button>
        <button onclick="gantiTab('laporan')" id="tabLaporan">Laporan</button>
        <button onclick="gantiTab('pengaturan')" id="tabPengaturan">Setting</button>
      </div>

      <div class="content-area">
        <!-- TAB KASIR -->
        <div id="kasir">
          <div class="card">
            <h3>1. Scan</h3>
            <input type="text" id="scanInput" placeholder="Klik & Scan disini..." autofocus />
            <button class="btn-kamera" onclick="toggleCamera('reader')">📷 Kamera</button>
            <div id="reader" class="hide"></div>
            
            <h3 style="margin-top:10px">2. Cari / Tambah</h3>
            <select id="pilihBarang" onchange="tambahManual()"></select>
            <div style="display:flex; gap:5px; margin-top:5px;">
               <input type="number" id="qtyManual" value="1" placeholder="Qty" style="flex:1" />
               <button class="btn-small" style="flex:1" onclick="tambahManual()">+ Add</button>
            </div>
          </div>

          <div class="card">
            <h3>Struk Belanja</h3>
            <div class="table-responsive-wrapper">
              <table id="tabelStruk">
                <thead><tr><th>Item</th><th>Qty</th><th>Harga</th><th>Sub</th><th>Aksi</th></tr></thead>
                <tbody></tbody>
              </table>
            </div>
            <div class="total-box">
              <div class="angka">Rp <span id="totalHarga">0</span></div>
            </div>
            <div class="total-box emas" style="font-size:12px;">
              Est. Laba: Rp <span id="labaStruk">0</span>
            </div>
            <input type="number" id="bayar" placeholder="Uang Tunai" oninput="hitungKembali()" />
            <div class="total-box hijau">
              Kembali: Rp <span id="kembalian">0</span>
            </div>
            <button onclick="selesaiTransaksi()" style="background: var(--hijau);">SELESAI & PRINT</button>
            <button onclick="resetStruk()" style="background: #64748b;">Reset Struk</button>
          </div>
        </div>

        <!-- TAB BARANG -->
        <div id="barang" class="hide">
          <div class="card">
            <h3>Input Barang</h3>
            <button class="btn-kamera" onclick="toggleCamera('readerBarang')">📷 Scan Barcode</button>
            <div id="readerBarang" class="hide"></div>
            <input type="text" id="barcode" placeholder="Barcode" oninput="cekJenisBarang()" />
            <input type="text" id="nama" placeholder="Nama Barang" />
            <select id="kategoriInput">
              <option value="Makanan">🍜 Makanan</option>
              <option value="Minuman">🥤 Minuman</option>
              <option value="Rokok">🚬 Rokok</option>
              <option value="Snack">🍿 Snack</option>
              <option value="Lainnya">📦 Lainnya</option>
            </select>
            <div style="display:flex; gap:5px;">
                <input type="number" id="hargaBeli" placeholder="Modal" />
                <input type="number" id="hargaJual" placeholder="Jual" />
            </div>
            <input type="number" id="stokInput" placeholder="Jumlah Stok (Tambah)" />
            <button onclick="simpanBarangGoogle()">💾 Simpan ke Cloud</button>
            <button id="btnBatal" class="btn-hapus hide" onclick="batalEdit()">Batal Edit</button>
          </div>

          <div class="card">
            <h3>Daftar Barang</h3>
            <div class="table-responsive-wrapper">
                <table id="tabelBarang">
                  <thead><tr><th>Code</th><th>Nama</th><th>Stok</th><th>Aksi</th></tr></thead>
                  <tbody></tbody>
                </table>
            </div>
          </div>
        </div>

        <!-- TAB LAPORAN -->
        <div id="laporan" class="hide">
          <div class="card">
            <h3>Ringkasan</h3>
            <div style="display:flex; gap:10px;">
                <div class="total-box" style="flex:1"><div style="font-size:10px">OMSET</div><div class="angka" id="totalOmset">0</div></div>
                <div class="total-box emas" style="flex:1"><div style="font-size:10px">LABA</div><div class="angka" id="totalLaba">0</div></div>
            </div>
            <button onclick="google.script.run.exportToSheet()">📊 Export ke Sheet Baru</button>
            <button class="btn-hapus" onclick="hapusLaporan()">Hapus Laporan</button>
          </div>
          
          <div class="card">
             <h3>Grafik</h3>
             <div style="height: 200px; width: 100%;">
               <canvas id="chartLaporan"></canvas>
             </div>
          </div>

          <div class="card">
            <h3>Riwayat</h3>
            <div class="table-responsive-wrapper">
                <table id="tabelLaporan">
                  <thead><tr><th>Waktu</th><th>Total</th><th>Laba</th></tr></thead>
                  <tbody></tbody>
                </table>
            </div>
          </div>
        </div>

        <!-- TAB PENGATURAN -->
        <div id="pengaturan" class="hide">
          <div class="card">
            <h3>Pengaturan Toko</h3>
            <label>Nama Toko</label>
            <input type="text" id="inputNamaToko" />
            <label>Info Alamat / Footer</label>
            <textarea id="inputInfoToko" rows="3"></textarea>
            <button onclick="simpanPengaturanGoogle()">Simpan</button>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL STRUK -->
    <div id="modalStruk" class="modal hide">
        <div class="modal-content">
            <div id="printArea" style="font-family: monospace; border: 1px dashed #ccc; padding: 10px; background: #fff; margin-bottom: 10px;">
                <!-- Content Generated by JS -->
            </div>
            <div style="display:flex; gap:5px;">
                <button onclick="tutupModal()" style="background:#64748b;">Tutup</button>
                <button onclick="window.print()">🖨️ Print</button>
            </div>
        </div>
    </div>

    <script>
      // --- CONFIG & VARIABLES ---
      const LS_KEY_OFFLINE_TX = 'KASIR_OFFLINE_TX';
      const LS_KEY_OFFLINE_BARANG = 'KASIR_OFFLINE_BARANG_CACHE';
      
      let dbBarang = [];
      let dbTransaksi = []; // Gabungan dari Cloud + Offline
      let tokoData = {};
      let struk = [];
      let html5QrcodeScanner = null;
      let chartInstance = null;

      // --- INIT & SYNC ---
      window.onload = function() {
          updateOnlineStatus();
          window.addEventListener('online', updateOnlineStatus);
          window.addEventListener('offline', updateOnlineStatus);
          
          // Coba Load dari Google Cloud
          loadCloudData();
      };

      function updateOnlineStatus() {
          const badge = document.getElementById('connectionStatus');
          if (navigator.onLine) {
              badge.className = 'status-badge status-synced';
              badge.innerHTML = '🟢 Online: Sinkronisasi Aktif';
              // Jika baru saja connect, coba sync data
              attemptSync(); 
          } else {
              badge.className = 'status-badge status-offline';
              badge.innerHTML = '🔴 Offline: Data Disimpan di Lokal';
          }
      }

      function attemptSync() {
          // Ambil data offline dari LocalStorage
          let offlineTx = JSON.parse(localStorage.getItem(LS_KEY_OFFLINE_TX) || '[]');
          
          if (offlineTx.length > 0) {
              console.log("Mencoba sinkronisasi " + offlineTx.length + " transaksi...");
              google.script.run
                .withSuccessHandler(function(res) {
                    if (res && res.syncedCount > 0) {
                        alert(`✅ Berhasil mensinkronkan ${res.syncedCount} transaksi ke Google Sheet!`);
                        // Hapus local storage setelah sukses
                        localStorage.removeItem(LS_KEY_OFFLINE_TX);
                        // Reload data bersih dari cloud
                        loadCloudData();
                    }
                })
                .withFailureHandler(function(err) {
                    console.log("Gagal sync (mungkin offline lagi): " + err);
                })
                .syncOfflineData(offlineTx);
          }
      }

      function loadCloudData() {
          google.script.run.withSuccessHandler(function(data) {
              dbBarang = data.barang || [];
              tokoData = data.toko || {};
              
              // Load Transaksi dari Cloud
              let cloudTx = data.transaksi || [];
              
              // Gabungkan dengan Transaksi Offline (sementara di memori)
              let offlineTx = JSON.parse(localStorage.getItem(LS_KEY_OFFLINE_TX) || '[]');
              dbTransaksi = [...cloudTx, ...offlineTx];
              
              // Cek apakah ada perubahan barang offline yang perlu diterapkan?
              // (Sederhana: kita pakai dbBarang dari cloud sebagai master jika online)

              renderHeader();
              renderBarang();
              renderPilihBarang();
              renderLaporan();
              updateChart();
              
              document.getElementById('inputNamaToko').value = tokoData.nama || "";
              document.getElementById('inputInfoToko').value = tokoData.info || "";
          }).loadAppData();
      }

      // --- UI LOGIC ---
      function gantiTab(tab) {
          stopCamera();
          document.querySelectorAll('.content-area > div').forEach(d => d.classList.add('hide'));
          document.getElementById(tab).classList.remove('hide');
          document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('aktif'));
          document.getElementById('tab'+tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('aktif');
          
          if(tab === 'kasir') setTimeout(() => document.getElementById('scanInput').focus(), 100);
      }

      function renderHeader() {
          document.getElementById('headerNamaToko').innerText = tokoData.nama || "KASIR PRO";
          document.getElementById('headerInfoToko').innerText = tokoData.info || "Siap Melayani";
      }

      function simpanPengaturanGoogle() {
          let nama = document.getElementById('inputNamaToko').value;
          let info = document.getElementById('inputInfoToko').value;
          tokoData.nama = nama;
          tokoData.info = info;
          
          google.script.run.saveTokoData(nama, info);
          renderHeader();
          alert("Pengaturan Disimpan!");
      }

      // --- KASIR LOGIC (HYBRID) ---
      function tambahKeStruk(barcode, qty = 1) {
          let barang = dbBarang.find(b => b.barcode == barcode);
          if(!barang) return alert("Barang tidak ditemukan: " + barcode);
          if(barang.stok < qty) return alert("Stok kurang! Sisa: " + barang.stok);
          
          let diStruk = struk.find(s => s.barcode == barcode);
          if(diStruk) {
              if(barang.stok < diStruk.qty + qty) return alert("Stok kurang!");
              diStruk.qty += qty;
          } else {
              struk.push({
                  barcode: barang.barcode,
                  nama: barang.nama,
                  hargaBeli: barang.hargaBeli,
                  hargaJual: barang.hargaJual,
                  qty: qty
              });
          }
          beep();
          renderStruk();
      }

      function renderStruk() {
          let tbody = document.querySelector('#tabelStruk tbody');
          tbody.innerHTML = "";
          let total = 0;
          let laba = 0;
          
          struk.forEach((item, i) => {
              let sub = item.hargaJual * item.qty;
              total += sub;
              laba += (item.hargaJual - item.hargaBeli) * item.qty;
              tbody.innerHTML += `<tr>
                  <td>${item.nama}</td>
                  <td>${item.qty}</td>
                  <td>${item.hargaJual}</td>
                  <td>${sub}</td>
                  <td>
                    <button class="btn-small" onclick="ubahQty(${i}, -1)">-</button>
                    <button class="btn-small" onclick="ubahQty(${i}, 1)">+</button>
                    <button class="btn-hapus" onclick="hapusItem(${i})">X</button>
                  </td>
              </tr>`;
          });
          
          document.getElementById('totalHarga').innerText = total.toLocaleString();
          document.getElementById('labaStruk').innerText = laba.toLocaleString();
          hitungKembali();
      }

      function ubahQty(idx, val) {
          let item = struk[idx];
          let barang = dbBarang.find(b => b.barcode === item.barcode);
          
          if(val > 0 && barang.stok < item.qty + 1) return alert("Stok habis!");
          item.qty += val;
          if(item.qty < 1) hapusItem(idx);
          else renderStruk();
      }

      function hapusItem(idx) {
          struk.splice(idx, 1);
          renderStruk();
      }

      function tambahManual() {
          let kode = document.getElementById('pilihBarang').value;
          let qty = parseInt(document.getElementById('qtyManual').value) || 1;
          if(kode) {
              tambahKeStruk(kode, qty);
              document.getElementById('scanInput').focus();
          }
      }

      document.getElementById('scanInput').addEventListener('keypress', function(e) {
          if(e.key === 'Enter') {
              tambahKeStruk(this.value);
              this.value = "";
          }
      });

      function hitungKembali() {
          let total = struk.reduce((a, b) => a + b.hargaJual * b.qty, 0);
          let bayar = parseInt(document.getElementById('bayar').value) || 0;
          document.getElementById('kembalian').innerText = (bayar - total).toLocaleString();
      }

      function selesaiTransaksi() {
          if(struk.length === 0) return alert("Struk kosong");
          let totalJual = struk.reduce((a, b) => a + b.hargaJual * b.qty, 0);
          let totalModal = struk.reduce((a, b) => a + b.hargaBeli * b.qty, 0);
          let bayar = parseInt(document.getElementById('bayar').value) || 0;
          
          if(bayar < totalJual) return alert("Uang kurang!");

          // Validasi Stok
          for(let i=0; i<struk.length; i++) {
              let b = dbBarang.find(x => x.barcode === struk[i].barcode);
              if(b.stok < struk[i].qty) return alert("Stok " + b.nama + " tidak cukup sekarang!");
          }

          let transaksiObj = {
              waktu: new Date().toLocaleString('id-ID'),
              totalJual: totalJual,
              totalModal: totalModal,
              laba: totalJual - totalModal,
              itemList: struk
          };

          // LOGIKA HYBRID SAVE
          if (navigator.onLine) {
              // Coba simpan ke Google
              google.script.run
                .withSuccessHandler(function() {
                    finishTransactionSuccess(transaksiObj, dbBarang); // Update lokal dg data cloud
                })
                .withFailureHandler(function() {
                    // Jika gagal (misal koneksi putus tiba-tiba), simpan offline
                    saveOffline(transaksiObj);
                })
                .saveTransaction(transaksiObj);
          } else {
              // Offline: Simpan ke LocalStorage
              saveOffline(transaksiObj);
          }
      }

      function saveOffline(transaksiObj) {
          alert("⚠️ Tidak ada koneksi internet. Transaksi akan disimpan di Local Storage & disinkronkan nanti.");
          
          // Simpan ke LocalStorage
          let offlineTx = JSON.parse(localStorage.getItem(LS_KEY_OFFLINE_TX) || '[]');
          offlineTx.push(transaksiObj);
          localStorage.setItem(LS_KEY_OFFLINE_TX, JSON.stringify(offlineTx));
          
          // Update Local Variable (Agar laporan terupdate saat offline)
          dbTransaksi.push(transaksiObj);
          struk.forEach(s => {
              let b = dbBarang.find(x => x.barcode === s.barcode);
              if(b) b.stok -= s.qty;
          });

          finishTransactionSuccess(transaksiObj, dbBarang);
      }

      function finishTransactionSuccess(t, barangDb) {
          renderStrukPreview(t);
          resetStruk();
          renderBarang();
          renderLaporan();
          updateChart();
          
          document.getElementById('modalStruk').classList.remove('hide');
      }

      function renderStrukPreview(t) {
          let html = `<h3 style="text-align:center">${tokoData.nama}</h3>
                      <div style="text-align:center; font-size:12px; margin-bottom:10px;">${tokoData.info}</div>
                      <hr style="border-top:1px dashed #000">`;
          
          t.itemList.forEach(i => {
              html += `<div style="display:flex; justify-content:space-between; font-size:12px;">
                          <span>${i.nama} x${i.qty}</span>
                          <span>${(i.hargaJual*i.qty).toLocaleString()}</span>
                       </div>`;
          });
          
          let kembali = (parseInt(document.getElementById('bayar').value) || 0) - t.totalJual;
          
          html += `<hr style="border-top:1px dashed #000">
                   <div style="text-align:right; font-weight:bold;">TOTAL: ${t.totalJual.toLocaleString()}</div>
                   <div style="text-align:right;">BAYAR: ${document.getElementById('bayar').value}</div>
                   <div style="text-align:right;">KEMBALI: ${kembali.toLocaleString()}</div>
                   <div style="text-align:center; margin-top:10px; font-size:10px;">${t.waktu}</div>`;
                   
          document.getElementById('printArea').innerHTML = html;
      }

      function resetStruk() {
          struk = [];
          document.getElementById('bayar').value = "";
          document.getElementById('kembalian').innerText = "0";
          renderStruk();
      }

      function tutupModal() {
          document.getElementById('modalStruk').classList.add('hide');
      }

      // --- BARANG LOGIC ---
      function simpanBarangGoogle() {
          let data = {
              barcode: document.getElementById('barcode').value,
              nama: document.getElementById('nama').value,
              kategori: document.getElementById('kategoriInput').value,
              hargaBeli: document.getElementById('hargaBeli').value,
              hargaJual: document.getElementById('hargaJual').value,
              stokInput: document.getElementById('stokInput').value
          };

          if(!data.barcode || !data.nama) return alert("Lengkapi data!");
          
          google.script.run.withSuccessHandler(function(res) {
              alert(res.message);
              loadCloudData(); // Reload data dari cloud
              batalEdit();
          }).saveProduct(data);
      }

      function renderBarang() {
          let tbody = document.querySelector('#tabelBarang tbody');
          tbody.innerHTML = "";
          dbBarang.forEach((b, i) => {
              tbody.innerHTML += `<tr>
                  <td style="font-size:10px">${b.barcode}</td>
                  <td>${b.nama}<br><span class="badge" style="background:#e2e8f0">${b.kategori}</span></td>
                  <td style="font-weight:bold">${b.stok}</td>
                  <td>
                    <button class="btn-small" onclick="editBarang(${i})">✏️</button>
                    <button class="btn-hapus" onclick="hapusBarang(${b.barcode})">🗑️</button>
                  </td>
              </tr>`;
          });
      }

      function editBarang(i) {
          let b = dbBarang[i];
          document.getElementById('barcode').value = b.barcode;
          document.getElementById('nama').value = b.nama;
          document.getElementById('kategoriInput').value = b.kategori;
          document.getElementById('hargaBeli').value = b.hargaBeli;
          document.getElementById('hargaJual').value = b.hargaJual;
          document.getElementById('stokInput').value = 0;
          document.getElementById('btnBatal').classList.remove('hide');
      }

      function batalEdit() {
          document.getElementById('barcode').value = "";
          document.getElementById('nama').value = "";
          document.getElementById('hargaBeli').value = "";
          document.getElementById('hargaJual').value = "";
          document.getElementById('stokInput').value = "";
          document.getElementById('btnBatal').classList.add('hide');
      }
      
      function cekJenisBarang() {
          let kode = document.getElementById('barcode').value;
          let ada = dbBarang.find(b => b.barcode == kode);
          if(ada) {
              document.getElementById('nama').value = ada.nama;
              document.getElementById('kategoriInput').value = ada.kategori;
              document.getElementById('hargaBeli').value = ada.hargaBeli;
              document.getElementById('hargaJual').value = ada.hargaJual;
              document.getElementById('btnBatal').classList.remove('hide');
          }
      }

      function hapusBarang(barcode) {
          if(confirm("Hapus barang ini?")) {
              google.script.run.withSuccessHandler(loadCloudData).deleteProduct(barcode);
          }
      }

      function renderPilihBarang() {
          let sel = document.getElementById('pilihBarang');
          sel.innerHTML = '<option value="">-- Pilih --</option>';
          dbBarang.forEach(b => {
              let opt = document.createElement('option');
              opt.value = b.barcode;
              opt.text = b.nama + (b.stok > 0 ? "" : " (Habis)");
              sel.appendChild(opt);
          });
      }

      // --- LAPORAN & CHART ---
      function renderLaporan() {
          let tbody = document.querySelector('#tabelLaporan tbody');
          tbody.innerHTML = "";
          let totalOmset = 0;
          let totalLaba = 0;
          let hariIni = new Date().toLocaleDateString('id-ID');

          dbTransaksi.forEach(t => {
              if(t.waktu.includes(hariIni)) {
                  totalOmset += t.totalJual;
                  totalLaba += t.laba;
                  tbody.innerHTML += `<tr><td style="font-size:10px">${t.waktu}</td><td>${t.totalJual.toLocaleString()}</td><td>${t.laba.toLocaleString()}</td></tr>`;
              }
          });
          
          document.getElementById('totalOmset').innerText = totalOmset.toLocaleString();
          document.getElementById('totalLaba').innerText = totalLaba.toLocaleString();
      }

      function updateChart() {
          let ctx = document.getElementById('chartLaporan').getContext('2d');
          if(chartInstance) chartInstance.destroy();
          
          let dataPerJam = {};
          dbTransaksi.forEach(t => {
              let jam = t.waktu.split(',')[1].trim().substring(0,5);
              dataPerJam[jam] = (dataPerJam[jam] || 0) + t.totalJual;
          });
          
          chartInstance = new Chart(ctx, {
              type: 'line',
              data: {
                  labels: Object.keys(dataPerJam).sort(),
                  datasets: [{
                      label: 'Omset',
                      data: Object.values(dataPerJam),
                      borderColor: '#2563eb',
                      tension: 0.3
                  }]
              },
              options: { responsive: true, maintainAspectRatio: false }
          });
      }

      function hapusLaporan() {
          if(confirm("Hapus semua laporan?")) {
              google.script.run.withSuccessHandler(loadCloudData).deleteReport();
          }
      }

      // --- UTILS ---
      function beep() {
          try {
              let ctx = new (window.AudioContext || window.webkitAudioContext)();
              let osc = ctx.createOscillator();
              let gain = ctx.createGain();
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.frequency.value = 1000;
              gain.gain.value = 0.1;
              osc.start();
              osc.stop(ctx.currentTime + 0.1);
          } catch(e) {}
      }
      
      function toggleCamera(id) {
          if(html5QrcodeScanner) {
              stopCamera();
              return;
          }
          document.getElementById(id).classList.remove('hide');
          html5QrcodeScanner = new Html5QrcodeScanner(id, { fps: 10, qrbox: { width: 250, height: 150 } });
          html5QrcodeScanner.render((text) => {
              if(id === 'reader') {
                  tambahKeStruk(text);
                  document.getElementById('scanInput').focus();
              } else {
                  document.getElementById('barcode').value = text;
                  cekJenisBarang();
              }
              stopCamera();
          });
      }

      function stopCamera() {
          if(html5QrcodeScanner) {
              html5QrcodeScanner.clear().catch(() => {});
              html5QrcodeScanner = null;
          }
          document.getElementById('reader').classList.add('hide');
          document.getElementById('readerBarang').classList.add('hide');
      }
    </script>
  </body>
</html>
